<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: #eee;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5rem;
            color: #ffe600;
            text-shadow: 0 0 20px #ff1e00;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        .info-panel {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .info-panel .stat {
            padding: 10px 20px;
        }

        .info-panel .stat span {
            color: #ff4800;
            font-weight: bold;
        }

        .game-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .game-center {
            order: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        #difficulty-panel {
            text-align: center;
        }

        #difficulty-panel h2 {
            color: #ffffff;
            font-size: 1.5rem;
            margin-bottom: 30px;
            letter-spacing: 3px;
        }

        .difficulty-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .difficulty-buttons button {
            background: transparent;
            color: #ff4800;
            border: 2px solid #ff4800;
            padding: 15px 30px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 8px;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.2s;
        }

        .difficulty-buttons button:hover {
            background: #00d4ff;
            color: #000;
        }

        .blackout-btn {
            background: transparent !important;
            color: #888 !important;
            border: 2px solid #444 !important;
            opacity: 0.6;
        }

        .blackout-btn:hover {
            background: #000 !important;
            color: #fff !important;
            border-color: #fff !important;
            opacity: 1;
        }

        .game-wrapper.blackout-mode #grid {
            background: #000;
        }

        .game-wrapper.blackout-mode .cell {
            background: #000 !important;
            color: #000 !important;
        }

        .game-wrapper.blackout-mode .cell.player {
            background: #000 !important;
            color: #000 !important;
        }

        .game-wrapper.blackout-mode .game-stats {
            visibility: visible !important;
            opacity: 1 !important;
            color: #ff0040;
            text-shadow: 0 0 10px #ff0040;
            font-size: 1.2rem;
        }

        .game-wrapper.blackout-mode .game-stats span {
            color: #ff0040 !important;
        }

        #game-container {
            position: relative;
        }

        #grid {
            display: grid;
            gap: 1px;
            background: #000000;
        }

        .cell {
            width: 18px;
            height: 18px;
            background: #888888;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: default;
            transition: all 0.1s;
        }

        .cell.player {
            background: #00d4ff !important;
            color: #000 !important;
            font-weight: bold;
            box-shadow: 0 0 10px #00d4ff;
        }

        .cell.deactivated {
            background: #00ff88;
            color: #000;
        }

        .cell.fog-dark {
            background: #000000;
            color: #000000;
        }

        .cell.fog {
            background: #333333;
            color: #333333;
        }

        .cell.discovered {
            background: #ffffff;
        }

        .cell.revealed-mine {
            background: #a30bb7;
            color: #fff;
        }

        .cell.debug-safe {
            background: #ffff00;
            color: #000;
        }

        .cell.debug-notsafe {
            background: #ff69b4;
            color: #000;
        }

        #message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            z-index: 100;
        }

        #message.show {
            display: block;
        }

        #message h2 {
            font-size: 3rem;
            text-shadow: 0 0 20px currentColor;
        }

        #message.win h2 {
            color: #00ff88;
        }

        #message.lose h2 {
            color: #ff0040;
        }

        #message p {
            font-size: 1.2rem;
            margin-top: 10px;
            color: #888;
        }

        #message button {
            margin-top: 20px;
            background: transparent;
            color: #ff0040;
            border: 2px solid #ff0040;
            padding: 10px 30px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            font-family: inherit;
            font-weight: bold;
        }

        #message button:hover {
            background: #ff0040;
            color: #000;
        }

        #radar-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 8px;
            border: 2px solid #ff0040;
            display: none;
            text-align: center;
        }

        #radar-panel.show {
            display: block;
        }

        #radar-panel .note {
            font-size: 1.5rem;
            color: #00ff88;
            margin-top: 5px;
        }

        .controls {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #888;
        }

        .controls kbd {
            background: #333;
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid #555;
        }

        #sound-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #333;
            color: #fff;
            border: 2px solid #555;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
        }

        #sound-toggle:hover {
            background: #444;
        }

        #sound-toggle.on {
            border-color: #00ff88;
            color: #00ff88;
        }

        #info-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #333;
            color: #00d4ff;
            border: 2px solid #00d4ff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-family: inherit;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s;
        }

        #info-btn:hover {
            background: #00d4ff;
            color: #000;
        }
    </style>
</head>
<body>
    <a id="info-btn" href="https://github.com/Malsgr/hackaton" target="_blank">i</a>
    <button id="sound-toggle" class="on">SONIDO: ON</button>
    
    <h1>MINESWEEPER</h1>
    
    <div id="difficulty-panel">
        <h2>ELIGE DIFICULTAD</h2>
        <div class="difficulty-buttons">
            <button onclick="startGame('easy')">FÁCIL</button>
            <button onclick="startGame('normal')">NORMAL</button>
            <button onclick="startGame('hard')">DIFÍCIL</button>
        </div>
        <div class="difficulty-buttons" style="margin-top: 30px;">
            <button onclick="startGame('blackout')" class="blackout-btn">BLACKOUT</button>
        </div>
    </div>
    
    <div class="game-wrapper" style="display: none;">
        <div class="game-center">
            <div id="game-container">
                <div id="grid"></div>
            </div>
            
            <div class="game-stats">
                <div class="stat"><span id="lives" style="color: #ff0040; font-size: 1.4rem;">♥</span></div>
                <div class="mines-info">Minas restantes: <span id="mines">0</span></div>
            </div>
        </div>
    </div>
    
    <div id="message">
        <h2 id="msg-title"></h2>
        <p id="msg-text"></p>
        <button onclick="restartGame()">Jugar de nuevo</button>
    </div>
    
    <div id="radar-panel">
        <div class="note" id="radar-note"></div>
    </div>

    <script>
        let MAP_SIZE = 33;
        let MINE_PROBABILITY = 0.08;
        let TOTAL_MINES, CENTER, VISIBILITY_RADIUS;

        let game = {
            grid: [],
            playerX: 0,
            playerY: 0,
            lives: 3,
            gameOver: false,
            won: false,
            soundEnabled: true,
            onMine: false
        };

        function startGame(difficulty) {
            let isBlackout = false;
            
            switch(difficulty) {
                case 'easy':
                    MAP_SIZE = Math.floor(33 * 0.8);
                    MINE_PROBABILITY = 0.03;
                    break;
                case 'hard':
                    MAP_SIZE = 33;
                    MINE_PROBABILITY = 0.03 * 1.7;
                    break;
                case 'blackout':
                    MAP_SIZE = 33;
                    MINE_PROBABILITY = 0.03;
                    isBlackout = true;
                    break;
                default:
                    MAP_SIZE = 33;
                    MINE_PROBABILITY = 0.03;
            }
            
            TOTAL_MINES = Math.floor((MAP_SIZE * MAP_SIZE - 1) * MINE_PROBABILITY);
            CENTER = Math.floor(MAP_SIZE / 2);
            VISIBILITY_RADIUS = 5;
            
            const grid = document.getElementById('grid');
            grid.style.gridTemplateColumns = `repeat(${MAP_SIZE}, 18px)`;
            grid.style.gridTemplateRows = `repeat(${MAP_SIZE}, 18px)`;
            
            const gameWrapper = document.querySelector('.game-wrapper');
            gameWrapper.style.display = 'flex';
            if (isBlackout) {
                gameWrapper.classList.add('blackout-mode');
            } else {
                gameWrapper.classList.remove('blackout-mode');
            }
            
            document.getElementById('difficulty-panel').style.display = 'none';
            
            game.isBlackout = isBlackout;
            
            initGame();
        }

        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function ensureAudioContext() {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }
        
        function playSound(type) {
            if (!game.soundEnabled) return;
            ensureAudioContext();
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            switch(type) {
                case 'radar':
                    oscillator.frequency.setValueAtTime(440, audioContext.currentTime);
                    oscillator.frequency.setValueAtTime(554, audioContext.currentTime + 0.1);
                    oscillator.frequency.setValueAtTime(659, audioContext.currentTime + 0.2);
                    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.3);
                    break;
                case 'deactivate':
                    oscillator.frequency.setValueAtTime(659, audioContext.currentTime);
                    oscillator.frequency.setValueAtTime(880, audioContext.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.2);
                    break;
                case 'explode':
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(100, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(30, audioContext.currentTime + 0.5);
                    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.5);
                    break;
                case 'win':
                    [523, 659, 784, 1047].forEach((freq, i) => {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.setValueAtTime(freq, audioContext.currentTime + i * 0.15);
                        gain.gain.setValueAtTime(0.1, audioContext.currentTime + i * 0.15);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + i * 0.15 + 0.3);
                        osc.start(audioContext.currentTime + i * 0.15);
                        osc.stop(audioContext.currentTime + i * 0.15 + 0.3);
                    });
                    break;
                case 'error':
                    oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
                    oscillator.frequency.setValueAtTime(150, audioContext.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.2);
                    break;
                case 'loseLife':
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(80, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(40, audioContext.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.3);
                    break;
                case 'lose':
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(100, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(30, audioContext.currentTime + 0.8);
                    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.8);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.8);
                    break;
                case 'step':
                    oscillator.frequency.setValueAtTime(300, audioContext.currentTime);
                    gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.05);
                    break;
            }
        }

        class Cell {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.hasMine = false;
                this.mineDeactivated = false;
                this.isVisited = false;
                this.isVisible = false;
            }

            getNeighbors() {
                const neighbors = [];
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = this.x + dx;
                        const ny = this.y + dy;
                        if (nx >= 0 && nx < MAP_SIZE && ny >= 0 && ny < MAP_SIZE) {
                            neighbors.push(game.grid[ny][nx]);
                        }
                    }
                }
                return neighbors;
            }

            countAdjacentMines() {
                const neighborMines = this.getNeighbors().filter(n => n.hasMine && !n.mineDeactivated).length;
                const currentMine = this.hasMine && !this.mineDeactivated ? 1 : 0;
                return neighborMines + currentMine;
            }
        }

        function initGame() {
            const wasBlackout = game.isBlackout;
            game = {
                grid: [],
                playerX: CENTER,
                playerY: CENTER,
                lives: 3,
                gameOver: false,
                won: false,
                soundEnabled: game.soundEnabled,
                onMine: false,
                isBlackout: wasBlackout
            };

            for (let y = 0; y < MAP_SIZE; y++) {
                game.grid[y] = [];
                for (let x = 0; x < MAP_SIZE; x++) {
                    game.grid[y][x] = new Cell(x, y);
                }
            }

            game.grid[CENTER][CENTER].isVisited = true;
            placeMines();
            updateVisibility();
            renderGrid();
            updateInfo();
            hideMessage();
            hideRadar();
        }

        function placeMines() {
            let minesPlaced = 0;
            
            while (minesPlaced < TOTAL_MINES) {
                const x = Math.floor(Math.random() * MAP_SIZE);
                const y = Math.floor(Math.random() * MAP_SIZE);
                
                if (x === CENTER && y === CENTER) continue;
                if (game.grid[y][x].hasMine) continue;
                
                game.grid[y][x].hasMine = true;
                minesPlaced++;
            }
        }

        function updateVisibility() {
            for (let y = 0; y < MAP_SIZE; y++) {
                for (let x = 0; x < MAP_SIZE; x++) {
                    const cell = game.grid[y][x];
                    cell.isVisible = Math.abs(x - game.playerX) <= VISIBILITY_RADIUS && 
                                     Math.abs(y - game.playerY) <= VISIBILITY_RADIUS;
                    if (!game.gameOver) {
                        cell.isVisible = false;
                    }
                }
            }
        }

        function movePlayer(dx, dy) {
            if (game.gameOver) return;

            const oldX = game.playerX;
            const oldY = game.playerY;
            const newX = game.playerX + dx;
            const newY = game.playerY + dy;

            if (newX < 0 || newX >= MAP_SIZE || newY < 0 || newY >= MAP_SIZE) return;

            const oldCell = game.grid[oldY][oldX];
            const newCell = game.grid[newY][newX];

            if (oldCell.hasMine && !oldCell.mineDeactivated && game.onMine) {
                playSound('explode');
                game.lives = 0;
                game.gameOver = true;
                game.won = false;
                revealAllMines();
                renderGrid();
                updateInfo();
                playSound('lose');
                showMessage('GAME OVER', '');
                return;
            }

            game.playerX = newX;
            game.playerY = newY;
            game.grid[newY][newX].isVisited = true;
            playSound('step');

            if (newCell.hasMine && !newCell.mineDeactivated) {
                game.onMine = true;
            } else {
                game.onMine = false;
            }

            updateVisibility();
            checkWin();
            renderGrid();
            updateInfo();
        }

        function deactivateMine() {
            if (game.gameOver) return;

            const cell = game.grid[game.playerY][game.playerX];

            if (cell.hasMine && !cell.mineDeactivated) {
                cell.mineDeactivated = true;
                game.onMine = false;
                checkWin();
                playSound('deactivate');
                renderGrid();
                updateInfo();
            } else {
                playSound('error');
                game.lives--;
                playSound('loseLife');
                updateInfo();
                
                if (game.lives <= 0) {
                    game.gameOver = true;
                    game.won = false;
                    revealAllMines();
                    renderGrid();
                    playSound('lose');
                    showMessage('GAME OVER', '');
                }
            }
        }

        function useRadar() {
            if (game.gameOver) return;

            const cell = game.grid[game.playerY][game.playerX];
            const count = cell.countAdjacentMines();
            
            const radarPanel = document.getElementById('radar-panel');
            const radarNote = document.getElementById('radar-note');
            radarNote.textContent = `Minas cercanas: ${count}`;
            radarPanel.classList.add('show');
            
            ensureAudioContext();
            
            if (game.soundEnabled) {
                for (let i = 0; i < count; i++) {
                    setTimeout(() => {
                        const oscillator = audioContext.createOscillator();
                        const gainNode = audioContext.createGain();
                        oscillator.connect(gainNode);
                        gainNode.connect(audioContext.destination);
                        oscillator.frequency.setValueAtTime(440, audioContext.currentTime);
                        gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                        oscillator.start(audioContext.currentTime);
                        oscillator.stop(audioContext.currentTime + 0.15);
                    }, i * 200);
                }
            }
            
            return count;
        }

        function revealAllMines() {
            for (let y = 0; y < MAP_SIZE; y++) {
                for (let x = 0; x < MAP_SIZE; x++) {
                    const cell = game.grid[y][x];
                    if (cell.hasMine && !cell.mineDeactivated) {
                        cell.isVisible = true;
                        cell.isDiscovered = true;
                    }
                }
            }
        }

        function checkWin() {
            const minesRemaining = game.grid.flat().filter(c => c.hasMine && !c.mineDeactivated).length;
            
            if (minesRemaining === 0) {
                game.won = true;
                game.gameOver = true;
                playSound('win');
                showMessage('VICTORIA!', 'Has desactivado todas las minas!');
            }
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            for (let y = 0; y < MAP_SIZE; y++) {
                for (let x = 0; x < MAP_SIZE; x++) {
                    const cell = game.grid[y][x];
                    const cellDiv = document.createElement('div');
                    cellDiv.className = 'cell';

                    const isPlayer = x === game.playerX && y === game.playerY;
                    const inViewArea = Math.abs(x - game.playerX) <= VISIBILITY_RADIUS && 
                                      Math.abs(y - game.playerY) <= VISIBILITY_RADIUS;

                    if (isPlayer) {
                        cellDiv.classList.add('player');
                        cellDiv.textContent = '☺';
                    } else if (cell.mineDeactivated) {
                        cellDiv.classList.add('deactivated');
                        cellDiv.textContent = '✓';
                    } else if (cell.hasMine && !cell.mineDeactivated && (cell.isVisited || cell.isVisible)) {
                        cellDiv.classList.add('revealed-mine');
                        cellDiv.textContent = '✸';
                    } else if (!inViewArea) {
                        cellDiv.classList.add('fog-dark');
                    } else if (cell.isVisited) {
                        cellDiv.classList.add('discovered');
                        cellDiv.textContent = ' ';
                    } else {
                        cellDiv.classList.add('fog');
                    }

                    grid.appendChild(cellDiv);
                }
            }
        }

        function updateInfo() {
            const hearts = '♥'.repeat(game.lives);
            document.getElementById('lives').textContent = hearts;
            
            if (game.isBlackout) {
                document.getElementById('mines').textContent = '???';
            } else {
                const minesRemaining = game.grid.flat().filter(c => c.hasMine && !c.mineDeactivated).length;
                document.getElementById('mines').textContent = minesRemaining;
            }
        }

        function showMessage(title, text) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = `<h2>${title}</h2>${text ? `<p>${text}</p>` : ''}`;
            msgDiv.classList.remove('win', 'lose');
            msgDiv.classList.add(game.won ? 'win' : 'lose');
            msgDiv.classList.add('show');
        }

        function hideMessage() {
            document.getElementById('message').classList.remove('show');
        }

        function hideRadar() {
            document.getElementById('radar-panel').classList.remove('show');
        }

        function restartGame() {
            document.getElementById('difficulty-panel').style.display = 'block';
            document.querySelector('.game-wrapper').style.display = 'none';
            document.getElementById('message').classList.remove('show');
        }

        document.addEventListener('keydown', (e) => {
            if (game.gameOver) {
                if (e.key.toLowerCase() === 'r') {
                    restartGame();
                }
                return;
            }

            hideRadar();

            switch(e.key) {
                case 'ArrowUp':
                    e.preventDefault();
                    movePlayer(0, -1);
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    movePlayer(0, 1);
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    movePlayer(-1, 0);
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    movePlayer(1, 0);
                    break;
                case 'q':
                case 'Q':
                    useRadar();
                    break;
                case 'w':
                case 'W':
                    deactivateMine();
                    break;
                case 'r':
                case 'R':
                    restartGame();
                    break;
            }
        });

        document.getElementById('sound-toggle').addEventListener('click', function() {
            game.soundEnabled = !game.soundEnabled;
            this.textContent = `SONIDO: ${game.soundEnabled ? 'ON' : 'OFF'}`;
            this.classList.toggle('on', game.soundEnabled);
        });
    </script>
</body>
</html>
