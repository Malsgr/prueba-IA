<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscaminas Radar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: #eee;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5rem;
            color: #00d4ff;
            text-shadow: 0 0 20px #00d4ff;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        .info-panel {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .info-panel .stat {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #00d4ff;
        }

        .info-panel .stat span {
            color: #00d4ff;
            font-weight: bold;
        }

        #game-container {
            position: relative;
            background: #0a0a15;
            padding: 20px;
            border-radius: 12px;
            border: 3px solid #00d4ff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(33, 18px);
            grid-template-rows: repeat(33, 18px);
            gap: 1px;
            background: #1a1a2e;
        }

        .cell {
            width: 18px;
            height: 18px;
            background: #888888;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: default;
            transition: all 0.1s;
        }

        .cell.player {
            background: #00d4ff !important;
            color: #000 !important;
            font-weight: bold;
            box-shadow: 0 0 10px #00d4ff;
        }

        .cell.deactivated {
            background: #00ff88;
            color: #000;
        }

        .cell.fog-dark {
            background: #000000;
            color: #000000;
        }

        .cell.fog {
            background: #333333;
            color: #333333;
        }

        .cell.discovered {
            background: #ffffff;
        }

        .cell.revealed-mine {
            background: #ff0040;
            color: #fff;
        }

        .cell.debug-safe {
            background: #ffff00;
            color: #000;
        }

        .cell.debug-notsafe {
            background: #ff69b4;
            color: #000;
        }

        #message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px 50px;
            border-radius: 12px;
            border: 3px solid #00d4ff;
            text-align: center;
            display: none;
            z-index: 100;
        }

        #message.show {
            display: block;
        }

        #message h2 {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        #message.win h2 {
            color: #00ff88;
        }

        #message.lose h2 {
            color: #ff0040;
        }

        #message p {
            font-size: 1rem;
            margin-bottom: 20px;
            color: #aaa;
        }

        #message button {
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 10px 30px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            font-family: inherit;
            font-weight: bold;
        }

        #message button:hover {
            background: #00aacc;
        }

        #radar-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 8px;
            border: 2px solid #00d4ff;
            display: none;
            text-align: center;
        }

        #radar-panel.show {
            display: block;
        }

        #radar-panel .note {
            font-size: 1.5rem;
            color: #00ff88;
            margin-top: 5px;
        }

        .controls {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #888;
        }

        .controls kbd {
            background: #333;
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid #555;
        }

        #sound-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #333;
            color: #fff;
            border: 2px solid #555;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
        }

        #sound-toggle:hover {
            background: #444;
        }

        #sound-toggle.on {
            border-color: #00ff88;
            color: #00ff88;
        }
    </style>
</head>
<body>
    <button id="sound-toggle" class="on">SONIDO: ON</button>
    
    <h1>BUSCAMINAS RADAR</h1>
    
    <div class="info-panel">
        <div class="stat">Vidas: <span id="lives">3</span></div>
        <div class="stat">Posicion: (<span id="pos-x">16</span>, <span id="pos-y">16</span>)</div>
        <div class="stat">Minas: <span id="mines">0</span></div>
    </div>
    
    <div id="game-container">
        <div id="grid"></div>
    </div>
    
    <div class="controls">
        <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> Mover | 
        <kbd>Q</kbd> Radar | 
        <kbd>W</kbd> Desactivar mina | 
        <kbd>R</kbd> Reiniciar
    </div>
    
    <div id="message">
        <h2 id="msg-title"></h2>
        <p id="msg-text"></p>
        <button onclick="restartGame()">Jugar de nuevo</button>
    </div>
    
    <div id="radar-panel">
        <div class="note" id="radar-note"></div>
    </div>

    <script>
        const MAP_SIZE = 33;
        const MINE_PROBABILITY = 0.05;
        const TOTAL_CELLS = MAP_SIZE * MAP_SIZE;
        const TOTAL_MINES = Math.floor((TOTAL_CELLS - 1) * MINE_PROBABILITY);
        const CENTER = Math.floor(MAP_SIZE / 2);
        const VISIBILITY_RADIUS = 5;

        let game = {
            grid: [],
            playerX: CENTER,
            playerY: CENTER,
            lives: 3,
            gameOver: false,
            won: false,
            soundEnabled: true,
            onMine: false
        };

        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function ensureAudioContext() {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }
        
        function playSound(type) {
            if (!game.soundEnabled) return;
            ensureAudioContext();
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            switch(type) {
                case 'radar':
                    oscillator.frequency.setValueAtTime(440, audioContext.currentTime);
                    oscillator.frequency.setValueAtTime(554, audioContext.currentTime + 0.1);
                    oscillator.frequency.setValueAtTime(659, audioContext.currentTime + 0.2);
                    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.3);
                    break;
                case 'deactivate':
                    oscillator.frequency.setValueAtTime(659, audioContext.currentTime);
                    oscillator.frequency.setValueAtTime(880, audioContext.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.2);
                    break;
                case 'explode':
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(100, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(30, audioContext.currentTime + 0.5);
                    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.5);
                    break;
                case 'win':
                    [523, 659, 784, 1047].forEach((freq, i) => {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.setValueAtTime(freq, audioContext.currentTime + i * 0.15);
                        gain.gain.setValueAtTime(0.1, audioContext.currentTime + i * 0.15);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + i * 0.15 + 0.3);
                        osc.start(audioContext.currentTime + i * 0.15);
                        osc.stop(audioContext.currentTime + i * 0.15 + 0.3);
                    });
                    break;
                case 'error':
                    oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
                    oscillator.frequency.setValueAtTime(150, audioContext.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.2);
                    break;
                case 'step':
                    oscillator.frequency.setValueAtTime(300, audioContext.currentTime);
                    gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.05);
                    break;
            }
        }

        class Cell {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.hasMine = false;
                this.mineDeactivated = false;
                this.isVisited = false;
                this.isVisible = false;
            }

            getNeighbors() {
                const neighbors = [];
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = this.x + dx;
                        const ny = this.y + dy;
                        if (nx >= 0 && nx < MAP_SIZE && ny >= 0 && ny < MAP_SIZE) {
                            neighbors.push(game.grid[ny][nx]);
                        }
                    }
                }
                return neighbors;
            }

            countAdjacentMines() {
                return this.getNeighbors().filter(n => n.hasMine && !n.mineDeactivated).length;
            }
        }

        function initGame() {
            game = {
                grid: [],
                playerX: CENTER,
                playerY: CENTER,
                lives: 3,
                gameOver: false,
                won: false,
                soundEnabled: game.soundEnabled,
                onMine: false
            };

            for (let y = 0; y < MAP_SIZE; y++) {
                game.grid[y] = [];
                for (let x = 0; x < MAP_SIZE; x++) {
                    game.grid[y][x] = new Cell(x, y);
                }
            }

            game.grid[CENTER][CENTER].isVisited = true;
            placeMines();
            updateVisibility();
            renderGrid();
            updateInfo();
            hideMessage();
            hideRadar();
        }

        function placeMines() {
            let minesPlaced = 0;
            
            while (minesPlaced < TOTAL_MINES) {
                const x = Math.floor(Math.random() * MAP_SIZE);
                const y = Math.floor(Math.random() * MAP_SIZE);
                
                if (x === CENTER && y === CENTER) continue;
                if (game.grid[y][x].hasMine) continue;
                
                game.grid[y][x].hasMine = true;
                minesPlaced++;
            }
        }

        function placeMines() {
            let minesPlaced = 0;
            
            while (minesPlaced < TOTAL_MINES) {
                const x = Math.floor(Math.random() * MAP_SIZE);
                const y = Math.floor(Math.random() * MAP_SIZE);
                
                if (x === CENTER && y === CENTER) continue;
                if (game.grid[y][x].hasMine) continue;
                
                game.grid[y][x].hasMine = true;
                minesPlaced++;
            }
        }

        function updateVisibility() {
            for (let y = 0; y < MAP_SIZE; y++) {
                for (let x = 0; x < MAP_SIZE; x++) {
                    const cell = game.grid[y][x];
                    cell.isVisible = Math.abs(x - game.playerX) <= VISIBILITY_RADIUS && 
                                     Math.abs(y - game.playerY) <= VISIBILITY_RADIUS;
                }
            }
        }

        function movePlayer(dx, dy) {
            if (game.gameOver) return;

            const oldX = game.playerX;
            const oldY = game.playerY;
            const newX = game.playerX + dx;
            const newY = game.playerY + dy;

            if (newX < 0 || newX >= MAP_SIZE || newY < 0 || newY >= MAP_SIZE) return;

            const oldCell = game.grid[oldY][oldX];
            const newCell = game.grid[newY][newX];

            if (oldCell.hasMine && !oldCell.mineDeactivated && game.onMine) {
                playSound('explode');
                game.lives = 0;
                game.gameOver = true;
                game.won = false;
                revealAllMines();
                renderGrid();
                updateInfo();
                showMessage('GAME OVER', 'La mina exploto al salir de la casilla!');
                return;
            }

            game.playerX = newX;
            game.playerY = newY;
            game.grid[newY][newX].isVisited = true;
            playSound('step');

            if (newCell.hasMine && !newCell.mineDeactivated) {
                game.onMine = true;
            } else {
                game.onMine = false;
            }

            updateVisibility();
            checkWin();
            renderGrid();
            updateInfo();
        }

        function deactivateMine() {
            if (game.gameOver) return;

            const cell = game.grid[game.playerY][game.playerX];

            if (cell.hasMine && !cell.mineDeactivated) {
                cell.mineDeactivated = true;
                game.onMine = false;
                checkWin();
                playSound('deactivate');
                renderGrid();
                updateInfo();
            } else {
                playSound('error');
                game.lives--;
                updateInfo();
                
                if (game.lives <= 0) {
                    game.gameOver = true;
                    game.won = false;
                    revealAllMines();
                    renderGrid();
                    showMessage('GAME OVER', 'No habia mina!');
                }
            }
        }

        function useRadar() {
            if (game.gameOver) return;

            const cell = game.grid[game.playerY][game.playerX];
            const count = cell.countAdjacentMines();
            
            ensureAudioContext();
            
            if (game.soundEnabled) {
                for (let i = 0; i < count; i++) {
                    setTimeout(() => {
                        const oscillator = audioContext.createOscillator();
                        const gainNode = audioContext.createGain();
                        oscillator.connect(gainNode);
                        gainNode.connect(audioContext.destination);
                        oscillator.frequency.setValueAtTime(440, audioContext.currentTime);
                        gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                        oscillator.start(audioContext.currentTime);
                        oscillator.stop(audioContext.currentTime + 0.15);
                    }, i * 200);
                }
            }
            
            return count;
        }

        function revealAllMines() {
            for (let y = 0; y < MAP_SIZE; y++) {
                for (let x = 0; x < MAP_SIZE; x++) {
                    const cell = game.grid[y][x];
                    if (cell.hasMine && !cell.mineDeactivated) {
                        cell.isVisible = true;
                        cell.isDiscovered = true;
                    }
                }
            }
        }

        function checkWin() {
            const minesRemaining = game.grid.flat().filter(c => c.hasMine && !c.mineDeactivated).length;
            
            if (minesRemaining === 0) {
                game.won = true;
                game.gameOver = true;
                playSound('win');
                showMessage('VICTORIA!', 'Has desactivado todas las minas!');
            }
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            for (let y = 0; y < MAP_SIZE; y++) {
                for (let x = 0; x < MAP_SIZE; x++) {
                    const cell = game.grid[y][x];
                    const cellDiv = document.createElement('div');
                    cellDiv.className = 'cell';

                    const isPlayer = x === game.playerX && y === game.playerY;
                    const inViewArea = Math.abs(x - game.playerX) <= VISIBILITY_RADIUS && 
                                      Math.abs(y - game.playerY) <= VISIBILITY_RADIUS;

                    if (isPlayer) {
                        cellDiv.classList.add('player');
                        cellDiv.textContent = '☺';
                    } else if (!inViewArea) {
                        cellDiv.classList.add('fog-dark');
                    } else if (cell.mineDeactivated) {
                        cellDiv.classList.add('deactivated');
                        cellDiv.textContent = '✓';
                    } else if (cell.hasMine && !cell.mineDeactivated && cell.isVisited) {
                        cellDiv.classList.add('revealed-mine');
                        cellDiv.textContent = '✸';
                    } else if (cell.isVisited) {
                        cellDiv.classList.add('discovered');
                        cellDiv.textContent = ' ';
                    } else {
                        cellDiv.classList.add('fog');
                    }

                    grid.appendChild(cellDiv);
                }
            }
        }

        function updateInfo() {
            document.getElementById('lives').textContent = game.lives;
            document.getElementById('pos-x').textContent = game.playerX;
            document.getElementById('pos-y').textContent = game.playerY;
            
            const minesRemaining = game.grid.flat().filter(c => c.hasMine && !c.mineDeactivated).length;
            document.getElementById('mines').textContent = minesRemaining;
        }

        function showMessage(title, text) {
            const msgDiv = document.getElementById('message');
            document.getElementById('msg-title').textContent = title;
            document.getElementById('msg-text').textContent = text;
            msgDiv.classList.remove('win', 'lose');
            msgDiv.classList.add(game.won ? 'win' : 'lose');
            msgDiv.classList.add('show');
        }

        function hideMessage() {
            document.getElementById('message').classList.remove('show');
        }

        function hideRadar() {
            document.getElementById('radar-panel').classList.remove('show');
        }

        function restartGame() {
            initGame();
        }

        document.addEventListener('keydown', (e) => {
            if (game.gameOver) {
                if (e.key.toLowerCase() === 'r') {
                    restartGame();
                }
                return;
            }

            hideRadar();

            switch(e.key) {
                case 'ArrowUp':
                    e.preventDefault();
                    movePlayer(0, -1);
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    movePlayer(0, 1);
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    movePlayer(-1, 0);
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    movePlayer(1, 0);
                    break;
                case 'q':
                case 'Q':
                    useRadar();
                    break;
                case 'w':
                case 'W':
                    deactivateMine();
                    break;
                case 'r':
                case 'R':
                    restartGame();
                    break;
            }
        });

        document.getElementById('sound-toggle').addEventListener('click', function() {
            game.soundEnabled = !game.soundEnabled;
            this.textContent = `SONIDO: ${game.soundEnabled ? 'ON' : 'OFF'}`;
            this.classList.toggle('on', game.soundEnabled);
        });

        initGame();
    </script>
</body>
</html>
